<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Interactive quiz page for direct access only.">
    <meta name="theme-color" content="#07080a">
    <title>Private Quiz Console</title>
    <link rel="icon" href="../assets/icons/py-conjunto.png" type="image/png">
    <link rel="apple-touch-icon" href="../assets/icons/py-conjunto.png">
    <link rel="stylesheet" href="../assets/quiz.css">
  </head>
  <body>
    <main class="quiz-page">
      <header class="quiz-hero">
        <p class="quiz-hero__eyebrow">Private quiz access</p>
        <h1 id="quiz-title" class="quiz-hero__title">Quiz</h1>
        <p id="quiz-intro" class="quiz-hero__intro">
          Each question can be checked individually. The answer key stays hidden unless you explicitly reveal it.
        </p>
      </header>

      <section id="quiz-app" class="quiz-app" aria-live="polite">
        <p class="quiz-loading">Loading quiz…</p>
      </section>
    </main>

    <script
      type="module"
      src="../assets/js/quiz.js"
      data-quiz-data="../assets/data/quiz-batches.json"
      data-quiz-label="CPA Quiz"
    ></script>
  </body>
</html>
