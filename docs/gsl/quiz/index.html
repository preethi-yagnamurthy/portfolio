<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Private GSL quiz console for direct access only.">
    <meta name="theme-color" content="#07080a">
    <title>GSL Quiz</title>
    <link rel="icon" href="../../assets/icons/py-conjunto.png" type="image/png">
    <link rel="apple-touch-icon" href="../../assets/icons/py-conjunto.png">
    <link rel="stylesheet" href="../../assets/quiz.css">
  </head>
  <body>
    <main class="quiz-page">
      <header class="quiz-hero">
        <p class="quiz-hero__eyebrow">Private GSL access</p>
        <h1 id="quiz-title" class="quiz-hero__title">GSL Quiz</h1>
        <p id="quiz-intro" class="quiz-hero__intro">
          Dedicated GSL question practice. Keep the index open separately when you want to drill retrieval speed.
        </p>
        <nav class="gsl-linkbar" aria-label="GSL page sections">
          <a class="gsl-linkbar__item" href="../index/">Index explorer</a>
          <a class="gsl-linkbar__item gsl-linkbar__item--download" href="../../downloads/gsl_index_workbook_extended.xlsx" download>
            Download workbook
          </a>
        </nav>
      </header>

      <section id="quiz-section" class="gsl-panel gsl-panel--quiz" aria-labelledby="gsl-quiz-title">
        <div class="gsl-panel__header">
          <div>
            <p class="gsl-panel__eyebrow">Practice console</p>
            <h2 id="gsl-quiz-title">GSL quiz bank</h2>
          </div>
          <p>Questions live in the GSL question bank and can be checked one at a time.</p>
        </div>
        <section id="quiz-app" class="quiz-app" aria-live="polite">
          <p class="quiz-loading">Loading GSL console...</p>
        </section>
      </section>
    </main>

    <script
      type="module"
      src="../../assets/js/quiz.js"
      data-quiz-data="../../assets/data/gsl-quiz-batches.json"
      data-quiz-label="GSL Quiz"
    ></script>
  </body>
</html>
